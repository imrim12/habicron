# Cloudflare Workers — serves the habicron landing page (public/) as static
# assets on https://habit.thecodeorigin.com.
#
# This is an assets-only Worker (no server script): wrangler uploads everything
# under ./public and serves index.html at the root. Deployed by
# .github/workflows/deploy.yml on pushes to main that touch the landing page.
name = "habicron-landing"
compatibility_date = "2025-01-01"

# Bind the custom domain. Requires the thecodeorigin.com zone to live in the
# same Cloudflare account as CLOUDFLARE_ACCOUNT_ID. Keep top-level keys (name,
# routes, …) ABOVE the [assets] table — TOML assigns any key after a table
# header to that table.
routes = [ { pattern = "habit.thecodeorigin.com", custom_domain = true } ]

[assets]
directory = "./public"
